<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>阿妮亚·沃洛格达</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #d5cdbd;
    display: flex;
    justify-content: center;
    padding: 1.5rem;
    font-family: 'Noto Serif SC', 'SimSun', serif;
    min-height: 100vh;
  }

  .page {
    width: 210mm;
    height: 297mm;
    background: #ece4d5;
    background-image:
      repeating-linear-gradient(45deg, transparent, transparent 3.5px, rgba(180,160,130,0.07) 3.5px, rgba(180,160,130,0.07) 4.5px),
      repeating-linear-gradient(-45deg, transparent, transparent 3.5px, rgba(180,160,130,0.07) 3.5px, rgba(180,160,130,0.07) 4.5px);
    padding: 14mm 14mm;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.06), 0 2px 16px rgba(0,0,0,0.12);
    overflow: hidden;
  }

  /* ── Hero ── */
  .hero { display: flex; gap: 6mm; align-items: center; margin-bottom: 8mm; }
  .hero-img { flex: 0 0 36mm; height: 36mm; background: #d8d0c0; border: 1px solid rgba(0,0,0,0.06); overflow: hidden; }
  .hero-img img { width: 100%; height: 100%; object-fit: cover; }
  .hero-tag { font-size: 6pt; color: #908070; letter-spacing: 0.28em; text-transform: uppercase; }
  .hero-name { font-size: 15pt; font-weight: 400; color: #3c4048; letter-spacing: 0.1em; margin: 1.5mm 0; }
  .hero-desc { font-size: 9pt; line-height: 1.9; color: #5a4e3e; letter-spacing: 0.04em; font-style: italic; max-width: 130mm; }
  .hero-icons { display: flex; gap: 5px; margin-top: 2mm; }
  .hero-icons img { width: 22px; height: 22px; opacity: 0.55; }

  /* ── Vignette ── */
  .vignette {
    max-width: 150mm;
    margin: 0 auto;
    padding: 6mm 0 5mm;
  }
  .vignette p {
    font-size: 8pt;
    line-height: 2.2;
    color: #5a4e3e;
    letter-spacing: 0.04em;
    text-indent: 2em;
    margin: 0 0 2mm 0;
  }

  /* ── Item list ── */
  .list { display: flex; flex-wrap: wrap; gap: 5mm 6mm; align-content: flex-start; }

  .item { display: flex; gap: 3mm; align-items: flex-start; }
  .item.t2 { flex: 0 0 calc(50% - 3mm); }
  .item.t3 { flex: 0 0 calc(33.33% - 4mm); }

  .item-img { flex: 0 0 20mm; height: 20mm; background: #d8d0c0; border: 1px solid rgba(0,0,0,0.05); overflow: hidden; }
  .item.t3 .item-img { flex: 0 0 15mm; height: 15mm; }
  .item-img img { width: 100%; height: 100%; object-fit: cover; }

  .item-body { flex: 1; display: flex; flex-direction: column; gap: 1mm; min-width: 0; }
  .item-tag { font-size: 5.5pt; color: #a09080; letter-spacing: 0.2em; text-transform: uppercase; }
  .item-name { font-size: 8pt; font-weight: 600; color: #3c3024; letter-spacing: 0.04em; line-height: 1.3; }
  .item.t3 .item-name { font-size: 7pt; }
  .item-desc { font-size: 7pt; line-height: 1.65; color: #6b5e4e; letter-spacing: 0.02em; }
  .item.t3 .item-desc { font-size: 6.2pt; }
  .item-icons { display: flex; gap: 3px; }
  .item-icons img { width: 15px; height: 15px; opacity: 0.5; }

  @media print {
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    body { background: #d5cdbd; padding: 0; }
    .page { box-shadow: none; }
  }
</style>
</head>
<body>

<div class="page" id="page"></div>

<script>
const IMG = {
  'ally.anya': 'sprite_ally_anya.png',
  'book.nameless': 'sprite_book_nameless.png',
  'tool.keeners.shawl': 'toolwinterb.png',
  'location.emptygrave.vologda': 'rarity.winter.png',
  'spirit.recorded.dead': 'spirit_winterd_edge.png',
  'ritual.mute.elegy': 'ritual.png',
  'influence.preforget': 'sprite_influence_preforget.png',
  'rumour.dont.ask': 'sprite_rumour_dontask.png',
  'element.violet.sketch': 'paintingmasterwinter.png',
};
const ICO = {
  '冬': 'winter.png', '启': 'knock.png', '蛾': 'moth.png', '秘史': 'secrethistories.png',
  '文献': 'books.png', '工具': 'tool.png', '影响': 'influence.png', '传闻': 'rumour.png', '仪式': 'ritual_icon.png',
};
const icons = (aa) => aa.map(a => `<img src="${ICO[a]}" alt="${a}">`).join('');

const D = {"character":{"name":"阿妮亚·沃洛格达","el":"ally.anya","aspects":["冬","启"],"desc":"她从来不会用沙哑得像冻土的声音做自我介绍。她的日记里没有她自己的名字。"},"items":[{"name":"《无名日记》","el":"book.nameless","type":"书籍","aspects":["文献","冬","秘史"],"desc":"封皮磨损。内页以细小工整的俄文笔迹写满——每页一个名字。全书四百一十二个名字。日记主人的名字不在其中。","t":2},{"name":"哭丧人的披肩","el":"tool.keeners.shawl","type":"工具","aspects":["工具","冬"],"desc":"黑色羊毛织品。触感永远湿冷。贴近耳际可听到模糊的俄语悼歌。唱到第三节总会停——不是唱完了，是被什么东西打断了。","t":2},{"name":"沃洛格达郊外的空坟","el":"location.emptygrave.vologda","type":"地点","aspects":["冬"],"desc":"圣安娜墓园。墓碑风化。坟穴中空，土面平整。教堂登记簿1910年11月条被指甲刮去。","t":2},{"name":"记名亡者","el":"spirit.recorded.dead","type":"召唤物","aspects":["冬","启"],"desc":"\"你还记得我吗。\"——轮廓模糊的人形。它说话时嘴不动。只属于某个记下它名字的人。","t":2},{"name":"哑歌之仪","el":"ritual.mute.elegy","type":"仪式","aspects":["仪式","冬","启"],"desc":"备一张不是你自己写的日记残页。置于朝北窗台。点燃蜡烛。全程不可出声。悼歌诗人不听有声音的祈祷。","t":2},{"name":"预忘","el":"influence.preforget","type":"影响","aspects":["影响","冬","蛾"],"desc":"我刚和谁说过话。站台上。黑披肩。想不起脸了。想不起声音了。但霜的气味还没散。","t":3},{"name":"打听不得的女人","el":"rumour.dont.ask","type":"传闻","aspects":["传闻","秘史","冬"],"desc":"莫斯科—喀山线的规矩。末班车，最后一节车厢，靠窗。披肩。不买票。不要问。","t":3},{"name":"维奥莱特的速写","el":"element.violet.sketch","type":"回忆","aspects":["冬","蛾"],"desc":"速写本里唯一有人物的一页。站台，长凳，一个女人。画中女人没有脸。旁注：\"第二天醒来已经忘了。但画还在。\"","t":3}]};

(function(){
  const cc = D.character;
  let h = `<div class="hero">
    <div class="hero-img"><img src="${IMG[cc.el]}"></div>
    <div>
      <div class="hero-tag">Long · Elegiast</div>
      <div class="hero-name">${cc.name}</div>
      <div class="hero-desc">${cc.desc}</div>
      <div class="hero-icons">${icons(cc.aspects)}</div>
    </div></div><div class="list">`;

    // Vignette between hero and items
  h += `<div class="vignette">
    <p>1910年冬天，沃洛格达的哭丧人一个接一个死于伤寒。她是最后一个。据说她咽气的时候唱完了整首悼歌——歌词是给她自己的。葬礼上没有人哭。哭丧人不需要别人替她哭。</p>
    <p>三年后有人迁葬，发现坟是空的。土面平整，不像被盗，像里面的东西自己散了。教堂登记簿上她的名字被人用指甲刮去了。</p>
    <p>那之后开始有人在莫斯科—喀山线的夜班车上见到一个女人。靠窗，最后一节车厢。穿黑披肩。从来不买票。列车员之间口口相传的规矩：不要查。不要问。有个喀山来的新人没听过这个规矩——聊了一整夜。第二天他连她长什么样都说不出来。只记得她的嗓子是沙的。还有她问了他母亲的名字。</p>
    <p>悼歌诗人唤回一个亡者，便从她那里取走一样东西。她失去的不是声音。是被人记住的能力。但她记得所有人。她一直在记。</p>
  </div>`;

  D.items.forEach(i => {
    h += `<div class="item t${i.t}">
      <div class="item-img"><img src="${IMG[i.el]}"></div>
      <div class="item-body">
        <div class="item-tag">${i.type}</div>
        <div class="item-name">${i.name}</div>
        <div class="item-desc">${i.desc}</div>
        <div class="item-icons">${icons(i.aspects)}</div>
      </div></div>`;
  });

  h += '</div>';
  document.getElementById('page').innerHTML = h;
})();
</script>

</body>
</html>
