<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阿妮亚·沃洛格达</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0c10;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 1rem;
    font-family: 'Noto Serif SC', 'SimSun', serif;
    min-height: 100vh;
  }

  .page {
    width: 210mm;
    min-height: 297mm;
    background: #121118;
    background-image:
      radial-gradient(ellipse at 50% 15%, rgba(100,140,180,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 30% 80%, rgba(80,120,160,0.03) 0%, transparent 40%);
    padding: 8mm 10mm 8mm;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
  }

  /* Snowflake border ornaments */
  .border-top, .border-bottom {
    position: absolute;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 2mm;
    pointer-events: none;
    z-index: 0;
  }
  .border-top { top: 2mm; }
  .border-bottom { bottom: 2mm; }
  .border-top .flake, .border-bottom .flake {
    color: #405868;
    font-size: 6pt;
    opacity: 0.4;
  }
  .border-left, .border-right {
    position: absolute;
    top: 6mm; bottom: 6mm;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4mm;
    pointer-events: none;
    z-index: 0;
  }
  .border-left { left: 2.5mm; }
  .border-right { right: 2.5mm; }
  .border-left .flake, .border-right .flake {
    color: #405868;
    font-size: 5pt;
    opacity: 0.3;
  }

  /* Content — all relative to sit above border */
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3mm;
  }

  /* Hero */
  .hero {
    display: flex;
    align-items: center;
    gap: 4mm;
    width: 100%;
    max-width: 160mm;
    padding-bottom: 3mm;
    border-bottom: 1px solid rgba(120,160,200,0.08);
  }
  .hero-portrait {
    flex: 0 0 44mm;
    height: 44mm;
    overflow: hidden;
    border: 1px solid rgba(120,160,200,0.15);
  }
  .hero-portrait img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.85) saturate(0.7);
  }
  .hero-text {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 1.5mm;
  }
  .hero-name {
    font-size: 11pt;
    font-weight: 400;
    color: #8898b0;
    letter-spacing: 0.2em;
  }
  .hero-meta {
    font-size: 6pt;
    color: #506070;
    letter-spacing: 0.15em;
  }
  .hero-desc {
    font-size: 7pt;
    line-height: 1.9;
    color: #687888;
    letter-spacing: 0.05em;
    font-style: italic;
  }
  .hero-aspects {
    display: flex;
    gap: 3px;
    margin-top: 0.5mm;
  }
  .hero-aspects img {
    width: 14px;
    height: 14px;
    opacity: 0.5;
  }

  /* Constellation items — 2 rows of 4 */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2.5mm;
    width: 100%;
    max-width: 160mm;
  }
  .item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1mm;
    padding: 1.5mm;
  }
  .item-sprite {
    width: 28mm;
    aspect-ratio: 1;
    overflow: hidden;
    border: 1px solid rgba(120,160,200,0.1);
  }
  .item-sprite img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.8) saturate(0.6);
  }
  .item-type {
    font-size: 4.5pt;
    color: #485868;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .item-name {
    font-size: 6pt;
    font-weight: 400;
    color: #708090;
    letter-spacing: 0.08em;
    text-align: center;
    line-height: 1.3;
  }
  .item-desc {
    font-size: 5pt;
    line-height: 1.6;
    color: #586878;
    text-align: center;
    letter-spacing: 0.03em;
  }
  .item-aspects {
    display: flex;
    gap: 2px;
  }
  .item-aspects img {
    width: 10px;
    height: 10px;
    opacity: 0.4;
  }

  .section-label {
    font-size: 5.5pt;
    color: #405868;
    letter-spacing: 0.25em;
    text-align: center;
    width: 100%;
    padding: 2mm 0 1mm;
    border-bottom: 1px dotted rgba(120,160,200,0.06);
  }

  /* Print */
  @media print {
    body { background: #0d0c10; padding: 0; }
    .page { box-shadow: none; }
  }
  @media screen and (max-width: 800px) {
    .page { width: 100%; padding: 6mm 5mm; }
    .hero { flex-direction: column; align-items: center; }
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="page">
  <!-- Snowflake border -->
  <div class="border-top">&#10054;&#10052;&#10054;&#10052;&#10054;&#10052;&#10054;&#10052;&#10054;&#10052;&#10054;&#10052;&#10054;</div>
  <div class="border-bottom">&#10054;&#10052;&#10054;&#10052;&#10054;&#10052;&#10054;&#10052;&#10054;&#10052;&#10054;&#10052;&#10054;</div>
  <div class="border-left">&#10054;&#10052;&#10054;&#10052;&#10054;</div>
  <div class="border-right">&#10054;&#10052;&#10054;&#10052;&#10054;</div>

  <div class="content" id="content">
    <!-- rendered by JS -->
  </div>
</div>

<script>
const SPRITES = {
  'ally.anya': 'sprite_ally_anya.png',
  'book.nameless': 'sprite_book_nameless.png',
  'rumour.dont.ask': 'sprite_rumour_dontask.png',
  'influence.preforget': 'sprite_influence_preforget.png',
};
const ICONS = {
  '冬': '../../references/sprites/winter.png',
  '启': '../../references/sprites/knock.png',
  '蛾': '../../references/sprites/moth.png',
  '秘史': '../../references/sprites/secrethistories.png',
};

const DATA = {"character":{"name":"阿妮亚·沃洛格达","element_id":"ally.anya","aspects":["冬","启"],"desc":"她从来不会用沙哑得像冻土的声音做自我介绍。她的日记里没有她自己的名字。"},"constellation":[{"name":"《无名日记》","element_id":"book.nameless","type":"书籍","aspects":["冬","秘史"],"desc":"封皮磨损。内页以细小工整的俄文笔迹写满——每页一个名字。全书四百一十二个名字。日记主人的名字不在其中。"},{"name":"哭丧人的披肩","element_id":"tool.keeners.shawl","type":"工具","aspects":["冬","启"],"desc":"黑色羊毛织品。触感永远湿冷。贴近耳际可听到模糊的俄语悼歌。唱到第三节总会停——不是唱完了，是被什么东西打断了。"},{"name":"沃洛格达郊外的空坟","element_id":"location.emptygrave.vologda","type":"地点","aspects":["冬"],"desc":"圣安娜墓园。墓碑风化。坟穴中空，土面平整。教堂死亡登记簿1910年11月页有一条记录被指甲刮去。"},{"name":"记名亡者","element_id":"spirit.recorded.dead","type":"召唤物","aspects":["冬","启"],"desc":"\"你还记得我吗。\"——轮廓模糊的人形。它说话时嘴不动。只属于某个在很久以前记下了它名字的人。"},{"name":"哑歌之仪","element_id":"ritual.mute.elegy","type":"仪式","aspects":["冬","启"],"desc":"备一张不是你自己写的日记残页。置于朝北窗台。点燃蜡烛。全程不可出声。悼歌诗人不听有声音的祈祷。"},{"name":"预忘","element_id":"influence.preforget","type":"影响","aspects":["冬","蛾"],"desc":"我刚和谁说过话。站台上。黑披肩。我想不起她的脸了。想不起她的声音了。但霜的气味还没散。"},{"name":"打听不得的女人","element_id":"rumour.dont.ask","type":"传闻","aspects":["秘史","冬"],"desc":"莫斯科—喀山线的规矩。末班车最后一节车厢。穿黑披肩的女人。不买票。不要问。喀山来的新人，一九二三年冬天，不信——事后什么也说不出来。"},{"name":"维奥莱特的速写","element_id":"element.violet.sketch","type":"回忆","aspects":["冬","蛾"],"desc":"速写本里唯一有人物的一页。站台，长凳，一个女人。画中女人没有脸。旁注：\"第二天醒来已经忘了。但画还在。\""}]};

(function render(data) {
  const content = document.getElementById('content');
  const cc = data.character;

  // Hero
  const heroAspects = cc.aspects.map(a => ICONS[a] ? `<img src="${ICONS[a]}" alt="${a}">` : '').join('');
  content.insertAdjacentHTML('beforeend', `
    <div class="hero">
      <div class="hero-portrait"><img src="sprite_ally_anya.png"></div>
      <div class="hero-text">
        <div class="hero-name">${cc.name}</div>
        <div class="hero-meta">冬 / 启 · 长生者 · 悼歌诗人唤归</div>
        <div class="hero-desc">${cc.desc}</div>
        <div class="hero-aspects">${heroAspects}</div>
      </div>
    </div>
  `);

  // Grid
  content.insertAdjacentHTML('beforeend', '<div class="section-label">&#10054; 物 证 &#10054;</div><div class="grid" id="grid"></div>');

  const grid = document.getElementById('grid');
  data.constellation.forEach(item => {
    const spriteFile = SPRITES[item.element_id] || 'sprite_ally_anya.png';
    const aspects = (item.aspects||[]).map(a => ICONS[a] ? `<img src="${ICONS[a]}" alt="${a}">` : '').join('');

    grid.insertAdjacentHTML('beforeend', `
      <div class="item">
        <div class="item-sprite"><img src="${spriteFile}"></div>
        <div class="item-type">${item.type}</div>
        <div class="item-name">${item.name}</div>
        <div class="item-desc">${item.desc}</div>
        <div class="item-aspects">${aspects}</div>
      </div>
    `);
  });
})(DATA);
</script>

</body>
</html>
