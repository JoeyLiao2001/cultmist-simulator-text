<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阿妮亚·沃洛格达 — 叙事星座</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1612;
    background-image:
      radial-gradient(ellipse at 50% 30%, rgba(60,80,95,0.08) 0%, transparent 70%),
      radial-gradient(ellipse at 25% 70%, rgba(50,40,30,0.06) 0%, transparent 50%);
    color: #c8c0b8;
    font-family: 'Noto Serif SC', 'SimSun', 'Georgia', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .header h1 {
    font-size: 1.3rem;
    font-weight: 400;
    color: #dce6ec;
    letter-spacing: 0.2em;
    margin-bottom: 0.2rem;
  }
  .header .sub {
    font-size: 0.7rem;
    color: #6b6560;
    letter-spacing: 0.15em;
  }

  /* ── Tabletop ── */
  .tabletop {
    position: relative;
    width: 100%;
    max-width: 1100px;
    min-height: 700px;
    background:
      radial-gradient(ellipse at center, rgba(30,28,24,0.5) 0%, rgba(20,18,14,0.8) 100%);
    border-radius: 6px;
    box-shadow: inset 0 0 180px rgba(0,0,0,0.6), 0 0 2px rgba(255,255,255,0.04);
  }

  /* ── Card wrapper with scatter position/rotation ── */
  .card-pos {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  /* ── Card frame ── */
  .card {
    width: 260px;
    background: #2a2620;
    border: 8px solid transparent;
    border-image: url('../../references/sprites/card_border.png') 8 repeat;
    box-shadow:
      0 4px 20px rgba(0,0,0,0.5),
      0 1px 3px rgba(0,0,0,0.4);
    position: relative;
    overflow: hidden;
  }

  /* Sprite area */
  .card-sprite {
    width: 100%;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #1e1c18;
  }
  .card-sprite img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Text area */
  .card-text {
    padding: 10px 14px 8px;
    font-size: 0.72rem;
    line-height: 1.7;
    color: #b8b0a8;
    letter-spacing: 0.03em;
    background: linear-gradient(180deg, #2a2620 0%, #242018 100%);
    min-height: 50px;
  }

  /* Aspect bar */
  .card-aspects {
    display: flex;
    gap: 5px;
    padding: 4px 14px 8px;
    background: #1e1a14;
    border-top: 1px solid rgba(255,255,255,0.05);
    align-items: center;
  }
  .card-aspects img {
    width: 22px;
    height: 22px;
    opacity: 0.85;
    image-rendering: auto;
  }

  /* Card label below */
  .card-label {
    font-size: 0.62rem;
    color: #6b6560;
    letter-spacing: 0.1em;
    text-align: center;
    max-width: 240px;
    line-height: 1.4;
  }
  .card-label .label-type {
    color: #8b8070;
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    display: block;
    margin-bottom: 1px;
  }
  .card-label .label-name {
    color: #a09888;
  }

  /* ── Footer ── */
  .footer {
    margin-top: 2rem;
    font-size: 0.6rem;
    color: #4a4540;
    letter-spacing: 0.15em;
    text-align: center;
  }

  /* ── Responsive ── */
  @media (max-width: 800px) {
    .tabletop { min-height: 500px; overflow-x: auto; }
    .card { width: 200px; }
    .card-sprite img { object-fit: contain; }
    .card-text { font-size: 0.65rem; padding: 6px 10px 4px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>阿妮亚·沃洛格达</h1>
  <div class="sub">叙事星座 · 冬 / 启 · 长生者</div>
</div>

<div class="tabletop" id="tabletop">
  <!-- cards rendered by JS -->
</div>

<div class="footer">骨白鸽的失落色彩 · cultist-simulator-text</div>

<script>
// ── Sprite image mapping ──
const SPRITES = {
  'ally.anya': 'sprite_ally_anya.png',
  'book.nameless': 'sprite_book_nameless.png',
  // Others use placeholder — the generated sprite itself as fallback
};

// ── Aspect icon paths ──
const ASPECT_ICONS = {
  '冬': '../../references/sprites/winter.png',
  '启': '../../references/sprites/knock.png',
  '蛾': '../../references/sprites/moth.png',
  '秘史': '../../references/sprites/secrethistories.png',
};

// ── Card positions: scattered on the tabletop with slight random rotations ──
const POSITIONS = [
  { x: '4%',  y: '2%',  r: -2.5 },
  { x: '28%', y: '1%',  r: 1.8 },
  { x: '52%', y: '4%',  r: -1.2 },
  { x: '74%', y: '0%',  r: 2.5 },
  { x: '2%',  y: '44%', r: 1.0 },
  { x: '26%', y: '42%', r: -2.0 },
  { x: '52%', y: '46%', r: 1.5 },
  { x: '74%', y: '40%', r: -1.0 },
  { x: '40%', y: '20%', r: 0.3 },  // character card, center-biased
];

// ── Character card is more central and larger ──
const CHAR_INDEX = 0; // First in data

// ── Inline data (self-contained, no fetch needed) ──
const DATA = {"character":{"name":"阿妮亚·沃洛格达","name_en":"Anya of Vologda","element_id":"ally.anya","category":"characters","aspects":["冬","启"],"tier":"长生者","desc":"她从来不会用沙哑得像冻土的声音做自我介绍。她的日记里没有她自己的名字。"},"constellation":[{"name":"《无名日记》","name_en":"The Nameless Diary","element_id":"book.nameless","category":"books","type":"书籍","aspects":["冬","秘史"],"desc":"封皮是某种深色皮革，磨损得看不出原色。内页以一种细小而工整的笔迹写满——每一页一个名字，附带日期、地点、一两句特征。日记的主人从未在页中提及自己。读到第十三页时你注意到一件事：你不记得翻开这一页之前读过的任何一个名字了。它们还在纸上。只是不在你脑子里了。","note":"在沃洛格达火车站失物招领处存放了十五年，无人认领。标签上只写着'阿·沃'。"},{"name":"哭丧人的披肩","name_en":"The Keener's Shawl","element_id":"tool.keeners.shawl","category":"tools","type":"工具","aspects":["冬","启"],"desc":"一件黑色的羊毛披肩，边缘已磨出线头。触手永远湿冷——像刚从十一月的雾里走进来。如果在夜深时将它贴在耳边，能听到模糊的歌声，用俄语唱着悼亡的调子。嗓音是沙的。唱到第三节时总会停——不是唱完了，是被什么东西打断了。","note":""},{"name":"沃洛格达郊外的空坟","name_en":"The Empty Grave, Vologda","element_id":"location.emptygrave.vologda","category":"locations","type":"地点","aspects":["冬"],"desc":"圣安娜墓园，城北三俄里。最边缘一排，墓碑风化，仅辨'阿——娅'与1910年。坟穴中空。土面平整，无挖掘痕迹——不像被盗，像是里面的东西自己散了。教堂死亡登记簿1910年11月页上有一条记录被人用指甲刮去。对光倾斜：凹痕仍在。七个字符。","note":""},{"name":"预忘","name_en":"Pre-Oblivion","element_id":"influence.preforget","category":"influences","type":"影响","aspects":["冬","蛾"],"desc":"我刚和谁说过话。站台上。黑披肩。问了我往哪里去。我回答了。然后她走了。\n\n现在我试着回想她的脸——没有。声音——没有。我只记得我问了她一个问题，却忘了是什么。也忘了她有没有回答。\n\n但霜的气味还没散。","note":""},{"name":"记名亡者","name_en":"The Recorded Dead","element_id":"spirit.recorded.dead","category":"spirits","type":"召唤物","aspects":["冬","启"],"desc":"\"你还记得我吗。\"\n\n轮廓模糊。它说话时嘴不动——声音是从别的地方来的。站到你身后时没有脚步声。它不属于任何司辰，不属于任何召唤者，它只属于某个在很久以前记下了它名字的人。如果你此时翻开一本无名日记，你会发现某一页上的字迹正在变淡。不要去看。让它走。","note":""},{"name":"打听不得的女人","name_en":"\"A Woman You Don't Ask About\"","element_id":"rumour.dont.ask","category":"elements","type":"传闻","aspects":["秘史","冬"],"desc":"莫斯科—喀山线的规矩。末班车最后一节车厢，靠窗。穿黑披肩的女人。不买票。不要查。不要问。老列车员教给新人——不是规章里写的，是口口相传的那种东西。\n\n喀山来的一个新人，一九二三年冬天，不信。事后别人问她长什么样、什么口音、多大年纪——他一样也说不出来。只记得嗓子是沙的。还有她问了一句：你母亲叫什么名字。他回答了。她点了点头，走了。到现在他也不知道为什么。","note":""},{"name":"哑歌之仪","name_en":"Rite of the Mute Elegy","element_id":"ritual.mute.elegy","category":"rituals","type":"仪式","aspects":["冬","启"],"desc":"备一张不是你自己写的日记残页。置于纯白之门方向的窗台上。点燃蜡烛。仪式全程不可出声——这不是规矩，而是因为悼歌诗人不听有声音的祈祷。仪式完成后，残页上的名字会变成另一个人。不是你认识的人。但你会记住那个名字，记住很久，久到忘记自己为什么会记住。被记住的人欠的不是你。","note":""},{"name":"维奥莱特的速写","name_en":"Violet's Sketch","element_id":"element.violet.sketch","category":"elements","type":"回忆","aspects":["冬","蛾"],"desc":"在那本从不在画中出现人物的速写本里，有一页例外。一幅铅笔素描——画的是火车站台，一个女人坐在长凳上。维奥莱特在旁注里写道：'今天在雅罗斯拉夫尔站碰到了一个女人。声音很难听，像破掉的管风琴。她知道我的名字。我让她坐了三个小时。'画中的女人没有脸——维奥莱特在那里只画了几道铅笔擦痕。下面写着：'第二天醒来时，我已经不记得和她说过什么了。但画还在。'","note":"从维奥莱特的遗物中找到。她一生画了几百张画，这是唯一一张有人物的。"}]};

(function render(data) {
    const tabletop = document.getElementById('tabletop');
    const all = [data.character, ...data.constellation];

    all.forEach((item, i) => {
      const pos = POSITIONS[i] || POSITIONS[POSITIONS.length - 1];
      const isChar = !item.type;

      // Sprite
      const spriteFile = SPRITES[item.element_id] || SPRITES['ally.anya'];
      const spriteHtml = `<img src="${spriteFile}" alt="${item.name}" loading="lazy">`;

      // Aspect icons
      const aspectsHtml = (item.aspects || []).map(a => {
        const iconPath = ASPECT_ICONS[a];
        return iconPath ? `<img src="${iconPath}" alt="${a}" title="${a}">` : '';
      }).join('');

      // Type label
      const typeLabel = item.type || (isChar ? '角色' : '');
      const label = `
        <span class="label-type">${typeLabel}</span>
        <span class="label-name">${item.name}</span>
      `;

      const cardHtml = `
        <div class="card-pos" style="left:${pos.x}; top:${pos.y}; transform:rotate(${pos.r}deg);${isChar ? 'z-index:5;' : ''}">
          <div class="card" style="${isChar ? 'width:280px;' : ''}">
            <div class="card-sprite">${spriteHtml}</div>
            <div class="card-text">${(item.desc || '').replace(/\n/g, '<br>')}</div>
            <div class="card-aspects">${aspectsHtml}</div>
          </div>
          <div class="card-label">${label}</div>
        </div>
      `;

      tabletop.insertAdjacentHTML('beforeend', cardHtml);
    });
  })(DATA);
</script>

</body>
</html>
